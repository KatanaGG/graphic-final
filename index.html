<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Festival Boss Raid</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <img class="avatar" src="assets/player.png" alt="Player">
  <span class="my-code-label">🤝 โค้ดของคุณ (เอาไปแลกกับเพื่อน):</span>
  <span id="myCode" class="my-code">068-----</span>
</div>

<div class="boss-area">
  <img class="logo" src="assets/logo.png" alt="Festival Boss Raid">

  <div class="boss-wrapper">
    <img id="bossImg" class="boss-img" src="assets/boss.png" alt="Festival Boss">
    <img id="slashFx" class="slash-fx" src="assets/player-slash.png" alt="">
    <div id="dmgLayer" class="dmg-layer"></div>
  </div>

  <div class="hp-bar">
    <div id="hpFill"></div>
  </div>

  <p id="hpText">HP: ...</p>
  <button id="attackBtn" class="attack-btn"><img src="assets/attack-button.png" alt="TAP ATTACK"></button>
</div>

<div class="quest-area">
  <p class="quest-title">⚔️ ใส่โค้ดเพื่อนเพื่อปลดพลังโจมตี</p>
  <div class="quest-input-row">
    <input id="codeInput" class="code-input" type="text" inputmode="numeric" maxlength="8" placeholder="068xxxxx">
    <button id="codeBtn" class="code-btn">ใส่โค้ด</button>
  </div>
  <p id="questMsg" class="quest-msg"></p>
  <p class="quest-power">พลังโจมตี: <span id="powerText">10</span> / ครั้ง</p>
</div>

<div id="victoryModal" class="modal">
  <div class="modal-box">
    <h2>🎉 ล้มบอสสำเร็จ!</h2>
    <p>ทีมเราจัดการบอสได้แล้ว เก่งมาก!</p>
    <button id="closeVictory" class="modal-btn">สู้อีกครั้ง ⚔️</button>
  </div>
</div>


<!-- ✅ ใส่ script ตรงนี้ -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBozGRm3KUwh4QqBuVtpVEOIf5u9WrxCRU",
  authDomain: "graphic-final-event.firebaseapp.com",
  databaseURL: "https://graphic-final-event-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "graphic-final-event",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const MAX_HP = 15000;
const BASE_DAMAGE = 10;
const BONUS_PER_CODE = 10;
const CODE_PREFIX = "068";
const BOSS_NORMAL = "assets/boss.png";
const BOSS_HIT = "assets/boss-hit.png";

// ---------- elements ----------
const hpText = document.getElementById("hpText");
const hpFill = document.getElementById("hpFill");
const bossImg = document.getElementById("bossImg");
const dmgLayer = document.getElementById("dmgLayer");
const slashFx = document.getElementById("slashFx");
const attackBtn = document.getElementById("attackBtn");

const myCodeEl = document.getElementById("myCode");
const codeInput = document.getElementById("codeInput");
const codeBtn = document.getElementById("codeBtn");
const questMsg = document.getElementById("questMsg");
const powerText = document.getElementById("powerText");

const victoryModal = document.getElementById("victoryModal");
const closeVictoryBtn = document.getElementById("closeVictory");

// ---------- player code system (in memory only, nothing saved to device) ----------
function randomDigits(n) {
  let s = "";
  for (let i = 0; i < n; i++) s += Math.floor(Math.random() * 10);
  return s;
}

// wipe anything older (localStorage) versions of this game left on the device
try {
  localStorage.removeItem("myCode");
  localStorage.removeItem("usedCodes");
} catch (e) {}

// your own shareable code: 068 + 5 random digits.
// kept in memory ONLY — nothing is written to the player's device, so a
// refresh gives a fresh code and resets power (no leftover data anywhere).
let myCode = CODE_PREFIX + randomDigits(5);
myCodeEl.textContent = myCode;

// codes redeemed this session — unique only, so the same code can't be farmed
let usedCodes = [];

function currentDamage() {
  return BASE_DAMAGE + BONUS_PER_CODE * usedCodes.length;
}

function updatePower() {
  powerText.textContent = currentDamage();
}
updatePower();

function showMsg(text, ok) {
  questMsg.textContent = text;
  questMsg.className = "quest-msg " + (ok ? "ok" : "bad");
}

function redeemCode() {
  const code = codeInput.value.trim();

  if (!/^\d{8}$/.test(code)) {
    showMsg("โค้ดต้องเป็นตัวเลข 8 หลัก", false);
    return;
  }
  if (!code.startsWith(CODE_PREFIX)) {
    showMsg("โค้ดต้องขึ้นต้นด้วย " + CODE_PREFIX, false);
    return;
  }
  if (code === myCode) {
    showMsg("นี่คือโค้ดของคุณเอง ไปขอเพื่อน! 🙅", false);
    return;
  }
  if (usedCodes.includes(code)) {
    showMsg("โค้ดนี้ใช้ไปแล้ว ลองของคนอื่น", false);
    return;
  }

  usedCodes.push(code);
  updatePower();
  showMsg("ปลดพลัง! ตอนนี้ตีครั้งละ " + currentDamage() +
          " (โค้ดที่ใช้: " + usedCodes.length + ")", true);
  codeInput.value = "";
}

codeBtn.onclick = redeemCode;
codeInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") redeemCode();
});

// ---------- boss ----------
const bossRef = ref(db, "boss/hp");

let bossDead = false;

// realtime update
onValue(bossRef, (snapshot) => {
  let hp = snapshot.val();
  if (hp === null) {
    set(bossRef, MAX_HP);
    return;
  }
  hp = Math.max(0, hp);
  hpText.innerText = "HP: " + hp.toLocaleString();
  hpFill.style.width = (Math.min(hp, MAX_HP) / MAX_HP) * 100 + "%";

  if (hp <= 0 && !bossDead) {
    bossDead = true;
    victoryModal.classList.add("show");
  } else if (hp > 0 && bossDead) {
    // boss was revived (maybe by another player) — close the popup
    bossDead = false;
    victoryModal.classList.remove("show");
  }
});

// close victory popup -> revive boss. Only revive if it's still dead, so we
// don't clobber a boss that another player already brought back.
closeVictoryBtn.onclick = () => {
  victoryModal.classList.remove("show");
  onValue(bossRef, (snapshot) => {
    const hp = snapshot.val();
    if (hp === null || hp <= 0) {
      set(bossRef, MAX_HP);
    }
  }, { onlyOnce: true });
};

function spawnDamage(amount) {
  const el = document.createElement("div");
  el.className = "dmg-num";
  el.textContent = "-" + amount;
  el.style.left = (40 + Math.random() * 20) + "%";
  dmgLayer.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function triggerShake() {
  bossImg.classList.remove("shake");
  // force reflow so the animation restarts on rapid taps
  void bossImg.offsetWidth;
  bossImg.classList.add("shake");
}

// swap to the "hit" sprite + white flash, then revert shortly after
new Image().src = BOSS_HIT;   // preload so the first hit doesn't flicker
let hitTimer = null;
function showHit() {
  bossImg.src = BOSS_HIT;
  bossImg.classList.add("flash");
  clearTimeout(hitTimer);
  hitTimer = setTimeout(() => {
    bossImg.src = BOSS_NORMAL;
    bossImg.classList.remove("flash");
  }, 150);
}

// quick slash effect overlay on the boss
function showSlash() {
  slashFx.classList.remove("show");
  void slashFx.offsetWidth;
  slashFx.classList.add("show");
}

// attack
function attack() {
  if (bossDead) return;   // can't hit a defeated boss
  const dmg = currentDamage();
  triggerShake();
  showHit();
  showSlash();
  spawnDamage(dmg);
  onValue(bossRef, (snapshot) => {
    let hp = snapshot.val();
    if (hp === null || hp <= 0) return;
    set(bossRef, Math.max(0, hp - dmg));
  }, { onlyOnce: true });
}

attackBtn.onclick = attack;

</script>

</body>
</html>
