<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Festival Boss Raid</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <span class="my-code-label">🤝 โค้ดของคุณ (เอาไปแลกกับเพื่อน):</span>
  <span id="myCode" class="my-code">068-----</span>
</div>

<div class="boss-area">
  <h1>Festival Boss</h1>

  <div class="boss-wrapper">
    <img id="bossImg" class="boss-img" src="assets/boss.png" alt="Festival Boss">
    <div id="dmgLayer" class="dmg-layer"></div>
  </div>

  <div class="hp-bar">
    <div id="hpFill"></div>
  </div>

  <p id="hpText">HP: ...</p>
  <button id="attackBtn">TAP ATTACK ⚔️</button>
</div>

<div class="quest-area">
  <p class="quest-title">⚔️ ใส่โค้ดเพื่อนเพื่อปลดพลังโจมตี</p>
  <div class="quest-input-row">
    <input id="codeInput" class="code-input" type="text" inputmode="numeric" maxlength="8" placeholder="068xxxxx">
    <button id="codeBtn" class="code-btn">ใส่โค้ด</button>
  </div>
  <p id="questMsg" class="quest-msg"></p>
  <p class="quest-power">พลังโจมตี: <span id="powerText">10</span> / ครั้ง</p>
</div>


<!-- ✅ ใส่ script ตรงนี้ -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBozGRm3KUwh4QqBuVtpVEOIf5u9WrxCRU",
  authDomain: "graphic-final-event.firebaseapp.com",
  databaseURL: "https://graphic-final-event-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "graphic-final-event",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const MAX_HP = 1000;
const BASE_DAMAGE = 10;
const BONUS_PER_CODE = 10;
const CODE_PREFIX = "068";

// ---------- elements ----------
const hpText = document.getElementById("hpText");
const hpFill = document.getElementById("hpFill");
const bossImg = document.getElementById("bossImg");
const dmgLayer = document.getElementById("dmgLayer");
const attackBtn = document.getElementById("attackBtn");

const myCodeEl = document.getElementById("myCode");
const codeInput = document.getElementById("codeInput");
const codeBtn = document.getElementById("codeBtn");
const questMsg = document.getElementById("questMsg");
const powerText = document.getElementById("powerText");

// ---------- player code system (persisted in localStorage) ----------
function randomDigits(n) {
  let s = "";
  for (let i = 0; i < n; i++) s += Math.floor(Math.random() * 10);
  return s;
}

// your own shareable code: 068 + 5 random digits, stable across reloads
let myCode = localStorage.getItem("myCode");
if (!myCode || !/^068\d{5}$/.test(myCode)) {
  myCode = CODE_PREFIX + randomDigits(5);
  localStorage.setItem("myCode", myCode);
}
myCodeEl.textContent = myCode;

// codes already redeemed — unique only, so the same code can't be farmed
let usedCodes = [];
try {
  usedCodes = JSON.parse(localStorage.getItem("usedCodes")) || [];
} catch (e) {
  usedCodes = [];
}

function currentDamage() {
  return BASE_DAMAGE + BONUS_PER_CODE * usedCodes.length;
}

function updatePower() {
  powerText.textContent = currentDamage();
}
updatePower();

function showMsg(text, ok) {
  questMsg.textContent = text;
  questMsg.className = "quest-msg " + (ok ? "ok" : "bad");
}

function redeemCode() {
  const code = codeInput.value.trim();

  if (!/^\d{8}$/.test(code)) {
    showMsg("โค้ดต้องเป็นตัวเลข 8 หลัก", false);
    return;
  }
  if (!code.startsWith(CODE_PREFIX)) {
    showMsg("โค้ดต้องขึ้นต้นด้วย " + CODE_PREFIX, false);
    return;
  }
  if (code === myCode) {
    showMsg("นี่คือโค้ดของคุณเอง ไปขอเพื่อน! 🙅", false);
    return;
  }
  if (usedCodes.includes(code)) {
    showMsg("โค้ดนี้ใช้ไปแล้ว ลองของคนอื่น", false);
    return;
  }

  usedCodes.push(code);
  localStorage.setItem("usedCodes", JSON.stringify(usedCodes));
  updatePower();
  showMsg("ปลดพลัง! ตอนนี้ตีครั้งละ " + currentDamage() +
          " (โค้ดที่ใช้: " + usedCodes.length + ")", true);
  codeInput.value = "";
}

codeBtn.onclick = redeemCode;
codeInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") redeemCode();
});

// ---------- boss ----------
const bossRef = ref(db, "boss/hp");

// realtime update
onValue(bossRef, (snapshot) => {
  let hp = snapshot.val();
  if (hp === null) {
    set(bossRef, MAX_HP);
    return;
  }
  hpText.innerText = "HP: " + hp;
  hpFill.style.width = Math.max(0, (hp / MAX_HP) * 100) + "%";
});

function spawnDamage(amount) {
  const el = document.createElement("div");
  el.className = "dmg-num";
  el.textContent = "-" + amount;
  el.style.left = (40 + Math.random() * 20) + "%";
  dmgLayer.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function triggerShake() {
  bossImg.classList.remove("shake");
  // force reflow so the animation restarts on rapid taps
  void bossImg.offsetWidth;
  bossImg.classList.add("shake");
}

// attack
function attack() {
  const dmg = currentDamage();
  triggerShake();
  spawnDamage(dmg);
  onValue(bossRef, (snapshot) => {
    let hp = snapshot.val();
    set(bossRef, Math.max(0, hp - dmg));
  }, { onlyOnce: true });
}

attackBtn.onclick = attack;

</script>

</body>
</html>
